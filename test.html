<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyrkoårets bibeltexter</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<body class="bg-gray-100 p-4 font-sans text-gray-800">

    <div id="biblegateway" class="max-w-6xl mx-auto bg-white border-b border-gray-200 rounded-lg shadow-sm mb-4 p-6">
        <script>
            (function() {
                if ( !window.BG || typeof window.BG !== 'object') {
                    window.BG = {};
                }
                var BG = window.BG;

                BG.votdWriteCallback = function(json) {
                    var votd = json.votd;
                    var votd_html = '';
                    /* Notera: Detta genererar fortfarande Bootstrap-klasser. Vi kan styla dessa via style.css senare om det behövs */
                    votd_html += '<div class=""><blockquote class="blockquote card-body" style="padding-bottom:0px;"><p class="text-justify font-weight-light">' + votd.text;
                    votd_html += '</p><footer class="blockquote-footer tetx-center"><a href="' + votd.permalink +'">' + votd.display_ref + '</a>';
                    if (votd.audiolink) {
                      votd_html += ' <a rel="nofollow" href="' + votd.audiolink + '" title="Listen to chapter"><img alt="Listen to chapter" src="//www.biblegateway.com/assets/images/audio/sound.gif" border=0/></a>';
                    }
                    votd_html += ' <a href="' + votd.copyrightlink + '">' + votd.copyright + '</a>';
                    votd_html += '<footer><br><p class="text-xs text-gray-500">Powered by <a href="https://www.biblegateway.com/" title="The Bible in multiple languages, versions, and formats" rel="nofollow"><img src="https://www.biblegateway.com/assets/images/logos/bglogo_sm.gif?103106" height="32" alt="BibleGateway.com" border="0"></a></p>';
                    votd_html += '</blockquote></div>';
                    votd_html += '<form action="https://www.biblegateway.com/quicksearch/" target="_blank"><div class="flex flex-wrap gap-2 items-center mt-4"><div><input type="text" name="quicksearch" class="border border-gray-300 rounded px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-blue-500"></div><input type="hidden" name="version" value="SFB"><div><input type="submit" value="Sök på BibleGateway.com" class="bg-gray-200 hover:bg-gray-300 text-gray-800 px-3 py-1.5 rounded cursor-pointer transition"></div></div></form>'
                    document.write(votd_html);
                };
                window.BG = BG;
            })();
        </script>
        <script src="https://www.biblegateway.com/votd/get/?format=json&version=SFB&callback=BG.votdWriteCallback"></script>
        
        <noscript>
            <iframe framespacing="0" frameborder="no" src="https://www.biblegateway.com/votd/get/?format=html&version=NIV">View Verse of the Day</iframe>
        </noscript>
    </div>

    <div id="byt" class="max-w-6xl mx-auto bg-white rounded-lg shadow-sm p-4 mb-6">
        <div class="flex flex-wrap items-center gap-3">
            
            <div>
                <label class="sr-only" for="nyar">Ange år</label>
                <input id="nyar" type="text" name="nyar" class="border border-gray-300 rounded px-3 py-2 w-24 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="År" title="ange år">
            </div>

            <div>
                <label class="sr-only" for="nymanad">och månad</label>
                <select name="nymanad" id="nymanad" class="border border-gray-300 rounded px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"> 
                    <option value="12">Hela Året</option>
                    <option value="0">Januari</option>
                    <option value="1">Februari</option>
                    <option value="2">Mars</option>
                    <option value="3">April</option>
                    <option value="4">Maj</option>
                    <option value="5">Juni</option>
                    <option value="6">Juli</option>
                    <option value="7">Augusti</option>
                    <option value="8">September</option>
                    <option value="9">Oktober</option>
                    <option value="10">November</option>
                    <option value="11">December</option>
                </select>
            </div>

            <div>
                <label class="sr-only" for="ver">Bibel</label>
                <select name="ver" id="ver" class="border border-gray-300 rounded px-3 py-2 bg-white focus:outline-none focus:ring-2 focus:ring-blue-500"> 
                    <option value="se">SFB98</option>
                    <option value="se15">SFB15</option>
                    <option value="no">N11BM</option>
                    <option value="en">ESV</option>
                    <option value="eni">NIV</option>
                    <option value="it">NR06</option>
                    <option value="el">TR1894</option>
                    <option value="he">WLC</option>
                </select>
            </div>

            <div>
                <button id="btn" class="border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white px-4 py-2 rounded transition-colors duration-200" oncontextmenu="togglediv('test')">Hämta texter</button>
            </div>
            
            <div>
                <button id="btnk" class="border border-yellow-500 text-yellow-600 hover:bg-yellow-500 hover:text-white px-4 py-2 rounded transition-colors duration-200" oncontextmenu="togglediv('kal')">Hämta texter med daglig läsning</button>
            </div>
            
            <div>  
                <input type="button" id="togglecal" class="border border-teal-500 text-teal-600 hover:bg-teal-500 hover:text-white px-4 py-2 rounded transition-colors duration-200 cursor-pointer" value="Kalender">
            </div>

            <div>
                <input type="button" id="BibleGateway" class="border border-red-500 text-red-500 hover:bg-red-500 hover:text-white px-4 py-2 rounded transition-colors duration-200 cursor-pointer" value="BibleGateway">
            </div>
        </div>
    </div>

    <div style="display:none">
        <form action="https://www.biblegateway.com/quicksearch/" target="_blank">
            <table class="border border-red-800 mx-auto w-full max-w-sm text-center">
                <tr><th class="bg-red-800 text-white p-2">Sök på ett ord eller vers i Bibeln</th></tr>
                <tr><td class="bg-white p-2">
                    <div class="mb-2">
                        <input class="border rounded px-2 py-1 m-1" type="text" name="quicksearch" />
                        <input type="hidden" name="version" value="SFB"/>
                        <input class="bg-gray-200 rounded px-2 py-1 m-1 cursor-pointer" type="submit" value="Sök på BibleGateway.com" />
                    </div>
                    <a href="https://www.biblegateway.com/" title="The Bible in multiple languages, versions, and formats">
                        <img src="https://www.biblegateway.com/assets/images/logos/bglogo_sm.gif?103106" width="146" height="44" alt="BibleGateway.com" class="mx-auto" />
                    </a>
                </td></tr>
            </table>
        </form>
    </div>
    
    <div id="container" class="max-w-6xl mx-auto bg-white p-6 rounded-lg shadow-sm">
        <div id="bibelcalender"></div> 
    </div>

    <div>
        <p id="test" class="text-center mt-4"></p>
    </div>

    <div id="kal-container" style="display:none" class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded-lg shadow-sm">
        <div class="flex gap-2 mb-4">
            <button class="border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white px-4 py-2 rounded transition-colors duration-200" onclick="Export2Doc('kal')">Export to Word</button>
            <button class="border border-blue-500 text-blue-500 hover:bg-blue-500 hover:text-white px-4 py-2 rounded transition-colors duration-200" onclick="Export2Rtf('kal')">Export to Rtf</button>
        </div>
        <div id="kal" data-rtf=""></div>
    </div>

    <script src="bglinks.js" type="text/javascript"></script>
    <script src="bcalender.js"></script>
    <script src="script.js"></script>
    
</body>
</html>
